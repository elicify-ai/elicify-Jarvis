# Local development stack — mirrors what runs on Fly.
#
#   docker compose up --build
#
# Then open http://localhost:8080

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-jarvis:local
    container_name: hermes-jarvis
    restart: unless-stopped
    ports:
      - "8080:8080"   # public — reverse-proxied to dashboard + gateway
      - "8642:8642"   # direct OpenAI-compatible API (optional)
      - "9119:9119"   # direct dashboard (optional)
    volumes:
      - ./data:/opt/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
